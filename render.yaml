services:
  - type: web
    name: commoter
    runtime: ruby
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: commoter-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: commoter-redis
          type: redis
          property: connectionString

  - type: redis
    name: commoter-redis
    plan: free
    maxmemoryPolicy: noeviction

databases:
  - name: commoter-db
    plan: free
